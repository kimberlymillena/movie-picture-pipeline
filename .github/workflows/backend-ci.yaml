name: Backend Continuous Integration


on:
  push:
    branches: [ "main" ]
  workflow_dispatch:


jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install pipenv
      - run: pipenv install
      - run: pipenv run lint

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install pipenv
      - run: pipenv install
      - run: pipenv run test

  build:
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    defaults:
      run:
        working-directory: starter/backend
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t mp-backend:ci .